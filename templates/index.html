<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWaste - Waste Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .logo {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-box.dragover {
            border-color: #764ba2;
            background: #e8ebff;
        }

        .upload-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            font-size: 1em;
        }

        .upload-text strong {
            color: #667eea;
        }

        #fileInput {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .preview-section {
            display: none;
            margin-top: 30px;
        }

        .preview-section.show {
            display: block;
        }

        .preview-image {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .results {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #333;
        }

        .result-value {
            color: #667eea;
            font-weight: 600;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner.show {
            display: block;
        }

        .spin {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .filename {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin-top: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">♻️</div>
            <h1>SmartWaste</h1>
            <p>AI-Powered Waste Detection System</p>
        </div>

        <div class="upload-section">
            <div class="upload-box" id="uploadBox">
                <div class="upload-icon">📸</div>
                <div class="upload-text">
                    Click to upload or drag and drop<br>
                    <strong>PNG, JPG, GIF, BMP (Max 16MB)</strong>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*">
            <div class="filename" id="filename"></div>
        </div>

        <div class="button-group">
            <button class="btn-upload" id="uploadBtn">Upload & Predict</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>

        <div class="spinner" id="spinner">
            <div class="spin"></div>
            <p>Analyzing image...</p>
        </div>

        <div class="alert" id="alert"></div>

        <div class="preview-section" id="previewSection">
            <img id="previewImage" class="preview-image" alt="Preview">
            
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        const uploadBox = document.getElementById('uploadBox');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const spinner = document.getElementById('spinner');
        const alert = document.getElementById('alert');
        const previewSection = document.getElementById('previewSection');
        const previewImage = document.getElementById('previewImage');
        const resultsDiv = document.getElementById('results');
        const filenameDiv = document.getElementById('filename');

        let selectedFile = null;

        uploadBox.addEventListener('click', () => fileInput.click());

        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('dragover');
        });

        uploadBox.addEventListener('dragleave', () => {
            uploadBox.classList.remove('dragover');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const files = fileInput.files;
            if (files.length > 0) {
                selectedFile = files[0];
                filenameDiv.textContent = `Selected: ${selectedFile.name}`;
                
                // Show preview
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImage.src = e.target.result;
                };
                reader.readAsDataURL(selectedFile);
            }
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showAlert('Please select an image first', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', selectedFile);

            spinner.classList.add('show');
            hideAlert();

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    displayResults(data);
                    previewSection.classList.add('show');
                    showAlert('Prediction complete!', 'success');
                } else {
                    showAlert(data.error || 'Prediction failed', 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            } finally {
                spinner.classList.remove('show');
            }
        });

        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            filenameDiv.textContent = '';
            previewSection.classList.remove('show');
            hideAlert();
        });

        function displayResults(data) {
            const confidence = (data.confidence * 100).toFixed(2);
            const status = data.waste_detected ? '✅ Waste Detected' : '❌ No Waste Detected';
            
            resultsDiv.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Status:</span>
                    <span class="result-value">${status}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Confidence:</span>
                    <span class="result-value">${confidence}%</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Waste Class:</span>
                    <span class="result-value">ID: ${data.class_id}</span>
                </div>
                <div class="confidence-bar">
                    <div class="confidence-fill" style="width: ${confidence}%"></div>
                </div>
            `;
        }

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
        }

        function hideAlert() {
            alert.classList.remove('show');
        }
    </script>
</body>
</html>
